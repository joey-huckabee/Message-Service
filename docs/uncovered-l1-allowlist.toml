# Deferral allowlist for the requirement-coverage gate (L2-CICD-016 / L3-CICD-019).
#
# `scripts/check-requirement-coverage.py` fails CI if any L1 requirement rolls up
# to `Draft` in docs/TRACE-MATRIX.md (no linked verification artifact anywhere in
# its subtree) UNLESS it is listed here with a rationale. Each entry needs an
# `id` (L1-<CAT>-<NNN>) and a non-empty `reason`. Keep this list short: an entry
# is a promise to revisit, and its diff is where reviewers notice a gap being
# excused.
#
# Currently allowlisted: the v0.15.0 admin-console + login L1s. Their spec has
# landed (sub-step a); the implementation follows in later sub-steps, and each
# entry is removed as its L1 reaches Implemented. The list returns to empty at
# the v0.15.0 release cut.

[[allowed]]
id = "L1-AUTH-004"
reason = "v0.15.0 in progress: configurable local admin — spec landed sub-step a, implemented in sub-step b"

[[allowed]]
id = "L1-DASH-007"
reason = "v0.15.0 in progress: browser login page — spec landed sub-step a, implemented in sub-step d"

[[allowed]]
id = "L1-DASH-008"
reason = "v0.15.0 in progress: admin recipient console — spec landed sub-step a, implemented in sub-steps c/e"
