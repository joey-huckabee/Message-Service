repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        # Run mypy against the full project, not just the staged file
        # list pre-commit would otherwise forward. Single-file mypy
        # invocations can't resolve the message_service package because
        # it lives in src/ and mirrors-mypy runs in an isolated env.
        # The whole-project run is what matches `poetry run mypy src tests`.
        pass_filenames: false
        args: [src, tests, --config-file, pyproject.toml]
        additional_dependencies:
          - pytest
          - pydantic
          - types-jsonschema
          - structlog
          - grpcio
          - grpcio-tools
          - fastapi
          - uvicorn
          - httpx
          - aiosqlite
          - aiosmtplib
          - jinja2
          - prometheus-client
          - argon2-cffi
