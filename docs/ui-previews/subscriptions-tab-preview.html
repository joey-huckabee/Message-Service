<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Message-Service — Subscriptions</title>
<style>
  :root {
    --bg:#f6f7f9; --panel:#ffffff; --panel-2:#fbfcfd; --ink:#1b2733; --ink-soft:#5b6b7b;
    --ink-faint:#8a99a8; --line:#e2e8ee; --line-strong:#cfd8e1; --accent:#2563eb; --accent-ink:#fff;
    --global-bg:#e8f0fe; --global-ink:#1b52c4; --global-line:#c4d7fb;
    --pipe-bg:#e8f6f4; --pipe-ink:#0b6b62; --pipe-line:#bfe6e0;
    --tag-bg:#fdf4e3; --tag-ink:#8a5a00; --tag-line:#f0dcae;
    --shadow:0 1px 2px rgba(16,32,48,.06), 0 2px 8px rgba(16,32,48,.06);
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0e1319; --panel:#161d26; --panel-2:#131a22; --ink:#e6edf3; --ink-soft:#9fb0c0;
      --ink-faint:#6b7d8e; --line:#232d38; --line-strong:#313d4a; --accent:#4f8cff;
      --global-bg:#152238; --global-ink:#7fa8ff; --global-line:#26324a;
      --pipe-bg:#0f2622; --pipe-ink:#5fd0c0; --pipe-line:#1d3a34;
      --tag-bg:#2a2210; --tag-ink:#e0b055; --tag-line:#463a1c;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 2px 10px rgba(0,0,0,.25);
    }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased; }
  .topbar { background:var(--panel); border-bottom:1px solid var(--line); }
  .topbar .inner { max-width:1100px; margin:0 auto; padding:12px 20px; display:flex; align-items:center; gap:12px; }
  .brand { display:flex; align-items:center; gap:9px; font-weight:650; letter-spacing:-.2px; }
  .brand .dot { width:9px; height:9px; border-radius:3px; background:var(--accent); }
  .topbar .spacer { flex:1; }
  .who { color:var(--ink-faint); font-size:12.5px; } .who b { color:var(--ink-soft); font-weight:600; }
  .signout { font:inherit; font-size:13px; color:var(--ink-soft); background:transparent; border:1px solid var(--line-strong); border-radius:8px; padding:6px 12px; cursor:pointer; }

  .wrap { max-width:1100px; margin:0 auto; padding:24px 20px 60px; }
  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:20px; }
  .tab { padding:9px 14px; font-size:13.5px; font-weight:550; color:var(--ink-faint); border-bottom:2px solid transparent; cursor:pointer; }
  .tab.active { color:var(--ink); border-bottom-color:var(--accent); }
  h1 { font-size:20px; margin:0 0 2px; letter-spacing:-.3px; }
  .sub { color:var(--ink-faint); font-size:13px; }

  .pickrow { display:flex; align-items:flex-end; gap:14px; flex-wrap:wrap; margin:16px 0 18px; }
  .pickrow .grow { flex:1; min-width:240px; }
  label.lbl { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--ink-soft); margin-bottom:5px; }
  select, input.txt { width:100%; padding:9px 11px; font:inherit; color:var(--ink); background:var(--panel); border:1px solid var(--line-strong); border-radius:8px; }
  select:focus, input.txt:focus { outline:0; border-color:var(--accent); }

  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; margin-bottom:16px; }
  .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--ink-faint); margin:0; padding:13px 16px; border-bottom:1px solid var(--line); background:var(--panel-2); }
  .add { display:flex; align-items:flex-end; gap:12px; flex-wrap:wrap; padding:16px; }
  .add .field { min-width:150px; } .add .grow { flex:1; }
  .btn { font:inherit; font-size:13px; font-weight:600; border-radius:8px; padding:9px 16px; cursor:pointer; border:1px solid transparent; }
  .btn.primary { background:var(--accent); color:var(--accent-ink); } .btn.primary:hover { filter:brightness(1.06); }
  .btn.ghost { background:transparent; color:var(--ink-soft); border:1px solid var(--line-strong); } .btn.ghost:hover { border-color:var(--ink-faint); }
  .btn.small { padding:5px 10px; font-size:12.5px; }

  table { width:100%; border-collapse:collapse; }
  thead th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-faint); font-weight:600; padding:11px 16px; border-bottom:1px solid var(--line); background:var(--panel-2); }
  tbody td { padding:11px 16px; border-bottom:1px solid var(--line); vertical-align:middle; }
  tbody tr:last-child td { border-bottom:0; }
  tbody tr:hover { background:var(--panel-2); }
  .muted { color:var(--ink-faint); font-size:12.5px; }
  .target { font-family:var(--mono); font-size:12.5px; }
  .empty { padding:26px 16px; text-align:center; color:var(--ink-faint); }
  .pill { display:inline-flex; align-items:center; padding:2px 10px; border-radius:999px; font-size:12px; font-weight:600; background:var(--p-bg); color:var(--p-ink); border:1px solid var(--p-line); }
  .pill.GLOBAL { --p-bg:var(--global-bg); --p-ink:var(--global-ink); --p-line:var(--global-line); }
  .pill.PIPELINE { --p-bg:var(--pipe-bg); --p-ink:var(--pipe-ink); --p-line:var(--pipe-line); }
  .pill.TAG { --p-bg:var(--tag-bg); --p-ink:var(--tag-ink); --p-line:var(--tag-line); }
  .row-actions { text-align:right; }
  .hidden { display:none; }
</style>
</head>
<body>
  <div class="topbar"><div class="inner">
    <span class="brand"><span class="dot"></span>Message-Service</span>
    <span class="spacer"></span>
    <span class="who">signed in as <b>admin@example.com</b></span>
    <button class="signout">Sign out</button>
  </div></div>

  <div class="wrap">
    <div class="tabs">
      <div class="tab">Recipients</div>
      <div class="tab active">Subscriptions</div>
    </div>

    <h1>Notification subscriptions</h1>
    <div class="sub">Choose a recipient, then manage which finalized runs they are emailed about.</div>

    <div class="pickrow">
      <div class="grow">
        <label class="lbl" for="who">Recipient</label>
        <select id="who"></select>
      </div>
    </div>

    <div class="card">
      <h2>Add a subscription</h2>
      <div class="add">
        <div class="field">
          <label class="lbl" for="gran">Type</label>
          <select id="gran">
            <option value="GLOBAL">Global — every run</option>
            <option value="PIPELINE">Pipeline</option>
            <option value="TAG">Tag</option>
          </select>
        </div>
        <div class="field grow" id="target-wrap">
          <label class="lbl" for="target" id="target-lbl">Target</label>
          <select id="target"></select>
        </div>
        <button class="btn primary" id="add-btn">Add subscription</button>
      </div>
    </div>

    <div class="card">
      <h2 id="subs-title">Subscriptions</h2>
      <table>
        <thead><tr><th style="width:130px">Type</th><th>Target</th><th>Created</th><th class="row-actions">Actions</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

<script>
  // Representative data (mock only).
  var PIPELINES = ["nightly-etl", "sales-rollup", "inventory-sync", "risk-model"];
  var TAGS = ["finance", "sales", "ops", "marketing", "priority"];
  var RECIPIENTS = [
    { email:"jane@example.com",    subs:[ {id:11, g:"GLOBAL", t:null, c:"2026-07-02"},
                                          {id:12, g:"TAG", t:"finance", c:"2026-07-10"} ] },
    { email:"omar@example.com",    subs:[ {id:21, g:"PIPELINE", t:"nightly-etl", c:"2026-06-21"} ] },
    { email:"finance@example.com", subs:[] }
  ];

  var whoSel = document.getElementById("who");
  var granSel = document.getElementById("gran");
  var targetWrap = document.getElementById("target-wrap");
  var targetSel = document.getElementById("target");
  var targetLbl = document.getElementById("target-lbl");
  var rowsEl = document.getElementById("rows");
  var subsTitle = document.getElementById("subs-title");
  var current = 0;

  RECIPIENTS.forEach(function (r, i) {
    var o = document.createElement("option"); o.value = i; o.textContent = r.email; whoSel.appendChild(o);
  });

  function esc(s){ return String(s).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); }

  function syncTarget() {
    var g = granSel.value;
    if (g === "GLOBAL") { targetWrap.classList.add("hidden"); return; }
    targetWrap.classList.remove("hidden");
    targetLbl.textContent = g === "PIPELINE" ? "Pipeline" : "Tag";
    var opts = g === "PIPELINE" ? PIPELINES : TAGS;
    targetSel.innerHTML = opts.map(function (v){ return '<option value="'+esc(v)+'">'+esc(v)+"</option>"; }).join("");
  }

  function render() {
    var r = RECIPIENTS[current];
    subsTitle.textContent = "Subscriptions · " + r.email;
    if (!r.subs.length) {
      rowsEl.innerHTML = '<tr><td colspan="4" class="empty">This recipient has no subscriptions.</td></tr>';
      return;
    }
    rowsEl.innerHTML = r.subs.map(function (s) {
      var label = s.g === "GLOBAL" ? "Global" : (s.g === "PIPELINE" ? "Pipeline" : "Tag");
      var target = s.t ? '<span class="target">'+esc(s.t)+"</span>" : '<span class="muted">— every run —</span>';
      return "<tr>"+
        '<td><span class="pill '+s.g+'">'+label+"</span></td>"+
        "<td>"+target+"</td>"+
        '<td class="muted">'+esc(s.c)+"</td>"+
        '<td class="row-actions"><button class="btn ghost small" data-rm="'+s.id+'">Remove</button></td>'+
        "</tr>";
    }).join("");
    Array.prototype.forEach.call(rowsEl.querySelectorAll("[data-rm]"), function (b) {
      b.onclick = function () {
        var id = Number(b.getAttribute("data-rm"));
        RECIPIENTS[current].subs = RECIPIENTS[current].subs.filter(function (s){ return s.id !== id; });
        render();
      };
    });
  }

  whoSel.onchange = function () { current = Number(whoSel.value); render(); };
  granSel.onchange = syncTarget;
  document.getElementById("add-btn").onclick = function () {
    var g = granSel.value;
    var t = g === "GLOBAL" ? null : targetSel.value;
    var dup = RECIPIENTS[current].subs.some(function (s){ return s.g === g && s.t === t; });
    if (dup) { return; }
    RECIPIENTS[current].subs.push({ id: Math.floor(1000 + RECIPIENTS[current].subs.length), g:g, t:t, c:"2026-07-19" });
    render();
  };

  syncTarget();
  render();
</script>
</body>
</html>
