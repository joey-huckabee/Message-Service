<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Message-Service — Sign in</title>
<style>
  :root {
    --bg: #eef1f5; --panel: #ffffff; --ink: #1b2733; --ink-soft: #5b6b7b; --ink-faint: #8a99a8;
    --line: #e2e8ee; --line-strong: #cfd8e1; --accent: #2563eb; --accent-ink: #ffffff;
    --danger-bg: #fdeceb; --danger-ink: #b3261e; --danger-line: #f3c9c6;
    --shadow: 0 1px 2px rgba(16,32,48,.06), 0 10px 30px rgba(16,32,48,.10);
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0f14; --panel: #161d26; --ink: #e6edf3; --ink-soft: #9fb0c0; --ink-faint: #6b7d8e;
      --line: #232d38; --line-strong: #313d4a; --accent: #4f8cff;
      --danger-bg: #2a1615; --danger-ink: #ff9a91; --danger-line: #4a2320;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 12px 34px rgba(0,0,0,.5);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
    font-family: var(--sans); font-size: 14px; line-height: 1.45;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%; max-width: 360px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; box-shadow: var(--shadow); padding: 30px 28px 26px;
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .brand .dot { width: 10px; height: 10px; border-radius: 3px; background: var(--accent); }
  .brand .name { font-weight: 650; letter-spacing: -.2px; font-size: 15px; }
  h1 { font-size: 20px; margin: 14px 0 2px; letter-spacing: -.3px; }
  .sub { color: var(--ink-faint); font-size: 13px; margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-soft);
          text-transform: uppercase; letter-spacing: .5px; margin: 14px 0 6px; }
  input {
    width: 100%; padding: 10px 12px; font: inherit; color: var(--ink);
    background: var(--bg); border: 1px solid var(--line-strong); border-radius: 8px;
    transition: border-color .12s, box-shadow .12s;
  }
  input:focus { outline: 0; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
  button.primary {
    width: 100%; margin-top: 22px; padding: 11px 14px; font: inherit; font-weight: 600;
    color: var(--accent-ink); background: var(--accent); border: 0; border-radius: 8px; cursor: pointer;
    transition: filter .12s, transform .04s;
  }
  button.primary:hover { filter: brightness(1.06); }
  button.primary:active { transform: translateY(1px); }
  .error {
    margin-top: 18px; padding: 9px 12px; border-radius: 8px; font-size: 13px;
    background: var(--danger-bg); color: var(--danger-ink); border: 1px solid var(--danger-line);
  }
  .foot { margin-top: 20px; color: var(--ink-faint); font-size: 11.5px; text-align: center; }
  .demo-toggle { margin-top: 16px; text-align: center; font-size: 11px; color: var(--ink-faint); }
  .demo-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .hidden { display: none; }
</style>
</head>
<body>
  <form class="card" onsubmit="return false">
    <div class="brand"><span class="dot"></span><span class="name">Message-Service</span></div>
    <h1>Sign in</h1>
    <div class="sub">Administrator access to the notification console.</div>

    <div id="err" class="error hidden">Invalid credentials. Please try again.</div>

    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="admin@example.com" value="admin@example.com">

    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••" value="hunter2hunter2">

    <button class="primary" type="submit">Sign in</button>

    <div class="foot">Local administrator account · session expires after inactivity</div>
    <div class="demo-toggle"><a onclick="document.getElementById('err').classList.toggle('hidden')">preview: toggle error state</a></div>
  </form>
</body>
</html>
